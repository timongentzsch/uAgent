name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: linux-x86_64
            arch: x86_64
            build_type: Debug
          - runner: ubuntu-24.04
            target: linux-x86_64
            arch: x86_64
            build_type: Release
          - runner: ubuntu-24.04-arm
            target: linux-arm64
            arch: aarch64
            build_type: Debug
          - runner: ubuntu-24.04-arm
            target: linux-arm64
            arch: aarch64
            build_type: Release
          - runner: macos-15
            target: macos-arm64
            arch: arm64
            build_type: Debug
          - runner: macos-15
            target: macos-arm64
            arch: arm64
            build_type: Release
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libedit-dev
      - name: Configure
        run: >-
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DUAGENT_WARNINGS_AS_ERRORS=ON
      - name: Build
        run: cmake --build build --parallel
      - name: Verify native architecture
        run: test "$(uname -m)" = "${{ matrix.arch }}"
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Package
        if: matrix.build_type == 'Release'
        shell: bash
        run: |
          version=$(sed -nE 's/^project\(uagent VERSION ([^ ]+).*/\1/p' CMakeLists.txt)
          if [[ "$GITHUB_REF" == refs/tags/v* && "$GITHUB_REF_NAME" != "v$version" ]]; then
            echo "tag $GITHUB_REF_NAME does not match project version v$version" >&2
            exit 1
          fi
          package_root="$RUNNER_TEMP/package"
          prefix="$package_root/uagent-$version"
          UAGENT_BUILD_DIR="$PWD/build" UAGENT_PREFIX="$prefix" ./install.sh
          "$prefix/bin/uagent" --version
          mkdir -p dist
          archive="uagent-$version-${{ matrix.target }}.tar.gz"
          tar -C "$package_root" -czf "dist/$archive" "uagent-$version"
          (cd dist && cmake -E sha256sum "$archive" > "$archive.sha256")
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: matrix.build_type == 'Release'
        with:
          name: ${{ matrix.target }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  sanitizers:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libedit-dev
      - name: Configure ASan and UBSan
        run: >-
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DUAGENT_WARNINGS_AS_ERRORS=ON
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        env:
          ASAN_OPTIONS: detect_leaks=1:strict_string_checks=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: ctest --test-dir build --output-on-failure

  python:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.28"
          enable-cache: true
      - run: uv run --frozen ruff check tests
      - run: uv run --frozen ruff format --check tests

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-and-test, sanitizers, python]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes
          gh release upload "$GITHUB_REF_NAME" dist/* --clobber
